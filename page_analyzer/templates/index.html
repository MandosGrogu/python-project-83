<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Анализатор страниц</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
</head>
<body>
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ category }}" role="alert">{{ message }}</div> 
    {% endfor %}
  {% endif %}
  <div class="mx-auto w-50 p-3">
    <form action="{{ url_for('post_urls') }}" method="post" class="bg-light border p-4">
      <h1 class="text-center">Анализатор страниц</h1>
      <label for="basic-url" class="form-label">Бесплатно проверяйте сайты на SEO-пригодность</label>
        <div class="d-flex gap-2">
          <input type="text" name="url" class="form-control" id="basic-url" aria-describedby="basic-addon3 basic-addon4" placeholder="https://www.example.com" value="{{ term }}" />
          <input type="submit" class="btn btn-primary" value="ПРОВЕРИТЬ" />
        </div>
    </form>
  </div>
</body>
</html>
